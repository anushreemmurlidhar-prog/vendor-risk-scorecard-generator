version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tool93
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tool93
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: replace-me
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    depends_on:
      - postgres
      - redis
      - ai-service
    ports:
      - '8080:8080'

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_API_URL: https://api.groq.com/v1/models/llama-3.3-70b/infer
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  postgres-data:
